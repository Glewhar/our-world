<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Our World beta 2.1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <div id="loading">
      <span id="loading-text">loading world…</span>
      <div id="loading-progress-wrap">
        <div id="loading-progress-bar"></div>
      </div>
      <span id="loading-step-label"></span>
    </div>

    <div id="ui">
      <header id="topbar">
        <div id="clock-pill">
          <button id="time-pause" type="button" aria-label="Pause time">
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <rect x="5" y="3.5" width="3.5" height="13" rx="1" />
              <rect x="11.5" y="3.5" width="3.5" height="13" rx="1" />
            </svg>
          </button>
          <div id="clock-readout">
            <div id="time-readout">12:00</div>
            <div id="date-readout">JAN 2067</div>
          </div>
          <svg id="season-icon" viewBox="0 0 18 36" aria-label="Sub-solar latitude">
            <line x1="9" y1="4" x2="9" y2="32" stroke="rgba(230,236,246,0.45)" stroke-width="1" stroke-linecap="round" />
            <line x1="2" y1="8" x2="16" y2="8" stroke="rgba(124,185,255,0.55)" stroke-width="0.9" stroke-linecap="round" stroke-dasharray="1.6 1.6" />
            <line x1="2" y1="18" x2="16" y2="18" stroke="rgba(230,236,246,0.55)" stroke-width="0.9" stroke-linecap="round" />
            <line x1="2" y1="28" x2="16" y2="28" stroke="rgba(124,185,255,0.55)" stroke-width="0.9" stroke-linecap="round" stroke-dasharray="1.6 1.6" />
            <circle id="season-sun" cx="9" cy="18" r="3" fill="#f5b840" />
          </svg>
        </div>

        <div id="fps-counter">-- FPS</div>

        <div id="topbar-right">
          <button id="active-events-chip" class="tb-chip" type="button" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M9 1L3 9h4l-1 6 6-8H8l1-6z" fill="currentColor"/></svg>
            <span class="ae-label">Events</span>
            <span class="ae-count" id="active-events-count">0</span>
          </button>
          <button id="settings-toggle" class="tb-chip tb-chip-square" type="button" aria-label="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34H9a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87V9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <aside id="subtle-stack"></aside>
      <aside id="disaster-rail"></aside>
      <section id="status-panel"></section>

      <div id="active-events-popover" hidden></div>
      <div id="settings-sheet" hidden>
        <div id="tweakpane-host"></div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/examples/jsm/": "./vendor/three/examples/jsm/",
          "tweakpane": "./vendor/tweakpane.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
