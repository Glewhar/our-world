<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth-Destroyer (Phase 2)</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: #cdd6e3;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: block;
      }
      #app canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        background: #06080c;
        font-size: 14px;
        letter-spacing: 0.05em;
        z-index: 10;
      }
      #loading.hidden {
        display: none;
      }
      #loading.error {
        color: #ff8a8a;
        white-space: pre-wrap;
        text-align: left;
        padding: 24px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.5;
        align-items: flex-start;
        justify-content: flex-start;
      }
      #loading-progress-wrap {
        width: 220px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        margin-top: 22px;
        overflow: hidden;
      }
      #loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(to right, #4a8fd4, #9cc4ff);
        border-radius: 999px;
        box-shadow: 0 0 8px rgba(127, 182, 255, 0.6);
        transition: width 0.25s ease;
      }
      #loading-step-label {
        margin-top: 12px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(230, 236, 246, 0.35);
        min-height: 14px;
      }

      /* Floating top-left time control: pause + 24-hour analog clock dial. */
      #time-control {
        position: fixed;
        left: 16px;
        top: 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 18px 10px 10px;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        z-index: 5;
      }
      #time-pause {
        flex: 0 0 auto;
        width: 64px;
        height: 64px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.08);
        color: #e6ecf6;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 50%;
        cursor: pointer;
        font-size: 26px;
        line-height: 1;
        padding: 0;
        transition: background 0.15s ease;
      }
      #time-pause:hover {
        background: rgba(255, 255, 255, 0.16);
      }
      #time-clock {
        position: relative;
        width: 120px;
        height: 120px;
        cursor: pointer;
        user-select: none;
        touch-action: none;
        flex: 0 0 auto;
      }
      #time-clock svg {
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }
      #time-clock .face {
        fill: rgba(255, 255, 255, 0.04);
        stroke: rgba(255, 255, 255, 0.2);
        stroke-width: 1;
      }
      #time-clock .ticks line {
        stroke: rgba(230, 236, 246, 0.5);
        stroke-width: 1.2;
        stroke-linecap: round;
      }
      #time-clock .ticks line.major {
        stroke: rgba(230, 236, 246, 0.9);
        stroke-width: 2;
      }
      #time-clock .labels text {
        fill: rgba(230, 236, 246, 0.8);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.04em;
        font-variant-numeric: tabular-nums;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      #time-clock .hand {
        stroke: #ffd9a0;
        stroke-width: 2.5;
        stroke-linecap: round;
        filter: drop-shadow(0 0 5px rgba(255, 217, 160, 0.75));
      }
      #time-clock .pivot {
        fill: #ffd9a0;
      }
      #time-readout-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        min-width: 58px;
      }
      #time-readout {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: rgba(230, 236, 246, 0.55);
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
        text-align: center;
      }
      #date-readout {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: rgba(230, 236, 246, 0.4);
      }

      /* Floating left-center vertical season thermostat. Range -30..+30 °C
         drives debug.state.materials.globe.seasonOffsetC. Track gradient is
         static (cold blue at bottom → warm red at top); the thumb + readout
         tint to match the current value via the --season-color CSS var. */
      #season-control {
        position: fixed;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 12px 10px;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        z-index: 5;
        width: 56px;
        --season-color: #e6ecf6;
      }
      #season-readout {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--season-color);
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
        min-height: 14px;
        transition: color 0.15s ease;
      }
      #season-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: rgba(230, 236, 246, 0.55);
      }
      #season-slider-wrap {
        position: relative;
        width: 28px;
        height: 240px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #season-slider-wrap::before,
      #season-slider-wrap::after {
        content: '';
        position: absolute;
        left: -2px;
        right: -2px;
        height: 1px;
        background: rgba(230, 236, 246, 0.18);
      }
      #season-slider-wrap::before {
        top: 0;
      }
      #season-slider-wrap::after {
        bottom: 0;
      }
      #season-slider {
        appearance: none;
        -webkit-appearance: none;
        width: 240px;
        height: 8px;
        transform: rotate(-90deg);
        background: linear-gradient(
          to right,
          #4ea8ff 0%,
          #6fb6ff 22%,
          rgba(230, 236, 246, 0.35) 50%,
          #ff8a5a 78%,
          #ff4d3d 100%
        );
        border-radius: 999px;
        outline: none;
        cursor: pointer;
        margin: 0;
      }
      #season-slider::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 24px;
        border-radius: 5px;
        background: var(--season-color);
        border: 2px solid rgba(0, 0, 0, 0.55);
        cursor: pointer;
        box-shadow: 0 0 10px var(--season-color);
        transition: box-shadow 0.15s ease, background 0.15s ease;
      }
      #season-slider::-moz-range-thumb {
        width: 14px;
        height: 24px;
        border-radius: 5px;
        background: var(--season-color);
        border: 2px solid rgba(0, 0, 0, 0.55);
        cursor: pointer;
        box-shadow: 0 0 10px var(--season-color);
      }

      /* Sea-level companion thermostat — sits to the right of #season-control
         with a 16 px gap (left = 16 + 56 + 16 = 88 px). Same layout as
         #season-control but drives debug.state.materials.ocean.seaLevelOffsetM,
         range -10000..+10000 m. Sandy at bottom (dry seafloor), deep blue at
         top (flooded). */
      #sealevel-control {
        position: fixed;
        left: 88px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 12px 10px;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        z-index: 5;
        width: 56px;
      }
      #sealevel-readout {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #e6ecf6;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
        min-height: 14px;
      }
      #sealevel-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: rgba(230, 236, 246, 0.55);
      }
      #sealevel-slider-wrap {
        position: relative;
        width: 28px;
        height: 240px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #sealevel-slider-wrap::before,
      #sealevel-slider-wrap::after {
        content: '';
        position: absolute;
        left: -2px;
        right: -2px;
        height: 1px;
        background: rgba(230, 236, 246, 0.18);
      }
      #sealevel-slider-wrap::before {
        top: 0;
      }
      #sealevel-slider-wrap::after {
        bottom: 0;
      }
      #sealevel-slider {
        appearance: none;
        -webkit-appearance: none;
        width: 240px;
        height: 8px;
        transform: rotate(-90deg);
        background: linear-gradient(
          to right,
          #d4b885 0%,
          #c9b186 22%,
          rgba(230, 236, 246, 0.35) 50%,
          #4ea8ff 78%,
          #1a3a6b 100%
        );
        border-radius: 999px;
        outline: none;
        cursor: pointer;
        margin: 0;
      }
      #sealevel-slider::-webkit-slider-thumb {
        appearance: none;
        -webkit-appearance: none;
        width: 14px;
        height: 24px;
        border-radius: 5px;
        background: #e6ecf6;
        border: 2px solid rgba(0, 0, 0, 0.55);
        cursor: pointer;
        box-shadow: 0 0 10px rgba(230, 236, 246, 0.5);
      }
      #sealevel-slider::-moz-range-thumb {
        width: 14px;
        height: 24px;
        border-radius: 5px;
        background: #e6ecf6;
        border: 2px solid rgba(0, 0, 0, 0.55);
        cursor: pointer;
        box-shadow: 0 0 10px rgba(230, 236, 246, 0.5);
      }


      /* Floating bottom-left layer toggles (clouds / ocean / atmosphere). */
      #layer-toggles {
        position: fixed;
        left: 16px;
        bottom: 16px;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        z-index: 5;
      }
      .layer-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        cursor: pointer;
        user-select: none;
        transition: background 0.15s ease;
      }
      .layer-toggle:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .layer-toggle .layer-icon {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        opacity: 0.55;
        transition: opacity 0.15s ease, filter 0.15s ease;
      }
      .layer-toggle .layer-name {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(230, 236, 246, 0.6);
        font-weight: 600;
        transition: color 0.15s ease;
      }
      .layer-toggle input[type='checkbox'] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }
      .layer-toggle .toggle-track {
        position: relative;
        width: 32px;
        height: 18px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        transition: background 0.15s ease;
        flex: 0 0 auto;
      }
      .layer-toggle .toggle-thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: rgba(230, 236, 246, 0.85);
        transition: left 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      }
      .layer-toggle input[type='checkbox']:checked + .toggle-track .toggle-thumb {
        left: 16px;
      }
      .layer-toggle input[type='checkbox']:checked ~ .layer-icon,
      .layer-toggle:has(input[type='checkbox']:checked) .layer-icon {
        opacity: 1;
      }
      .layer-toggle:has(input[type='checkbox']:checked) .layer-name {
        color: #e6ecf6;
      }

      /* Per-layer accent colour when ON. */
      .layer-toggle.clouds:has(input:checked) .toggle-track {
        background: rgba(220, 230, 245, 0.45);
      }
      .layer-toggle.clouds:has(input:checked) .toggle-thumb {
        background: #ffffff;
        box-shadow: 0 0 8px rgba(220, 230, 245, 0.7);
      }
      .layer-toggle.ocean:has(input:checked) .toggle-track {
        background: rgba(61, 166, 194, 0.5);
      }
      .layer-toggle.ocean:has(input:checked) .toggle-thumb {
        background: #6fd2ec;
        box-shadow: 0 0 8px rgba(61, 166, 194, 0.8);
      }
      .layer-toggle.atmosphere:has(input:checked) .toggle-track {
        background: rgba(127, 182, 255, 0.5);
      }
      .layer-toggle.atmosphere:has(input:checked) .toggle-thumb {
        background: #9cc4ff;
        box-shadow: 0 0 8px rgba(127, 182, 255, 0.8);
      }
      .layer-toggle.planes:has(input:checked) .toggle-track {
        background: rgba(255, 154, 111, 0.5);
      }
      .layer-toggle.planes:has(input:checked) .toggle-thumb {
        background: #ffb088;
        box-shadow: 0 0 8px rgba(255, 154, 111, 0.85);
      }

      /* Top-right collapsible Tweakpane host + toggle. Matches the left-side
         floats: dark glass, blur, 18px fillets. */
      #tweakpane-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: #e6ecf6;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        padding: 0;
        z-index: 7;
        transition: background 0.15s ease;
      }
      #tweakpane-toggle:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      /* Floating "Explode" smoke-test controls — region dropdown + button,
         sitting just left of the tweakpane toggle, reusing the same
         dark-glass tokens. */
      #explode-controls {
        position: fixed;
        top: 16px;
        right: 64px;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 7;
      }
      #explode-button,
      #region-select {
        height: 36px;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: #e6ecf6;
        cursor: pointer;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 13px;
        line-height: 1;
        transition: background 0.15s ease;
      }
      #explode-button {
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      #explode-button:hover,
      #region-select:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      #region-select {
        padding: 0 28px 0 12px;
        appearance: none;
        -webkit-appearance: none;
        background-image:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%23e6ecf6' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/></svg>");
        background-repeat: no-repeat;
        background-position: right 10px center;
      }
      #region-select:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.22);
      }
      #region-select option {
        background: #0a0e16;
        color: #e6ecf6;
      }
      #tweakpane-host {
        position: fixed;
        top: 64px;
        right: 16px;
        z-index: 6;
        max-height: calc(100vh - 80px);
        overflow-y: auto;
        transform: translateX(calc(100% + 32px));
        transition: transform 0.2s ease;
        width: 288px;
        padding: 8px;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 11px;
        --tp-base-font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        /* Tweakpane theme overrides — match the dim/bright palette. */
        --tp-base-background-color: transparent;
        --tp-base-shadow-color: rgba(0, 0, 0, 0);
        --tp-button-background-color: rgba(255, 255, 255, 0.1);
        --tp-button-background-color-active: rgba(255, 255, 255, 0.28);
        --tp-button-background-color-focus: rgba(255, 255, 255, 0.22);
        --tp-button-background-color-hover: rgba(255, 255, 255, 0.18);
        --tp-button-foreground-color: #e6ecf6;
        --tp-container-background-color: rgba(255, 255, 255, 0.05);
        --tp-container-background-color-active: rgba(255, 255, 255, 0.2);
        --tp-container-background-color-focus: rgba(255, 255, 255, 0.14);
        --tp-container-background-color-hover: rgba(255, 255, 255, 0.1);
        --tp-container-foreground-color: #cdd6e3;
        --tp-groove-foreground-color: rgba(255, 255, 255, 0.08);
        --tp-input-background-color: rgba(255, 255, 255, 0.08);
        --tp-input-background-color-active: rgba(255, 255, 255, 0.22);
        --tp-input-background-color-focus: rgba(255, 255, 255, 0.16);
        --tp-input-background-color-hover: rgba(255, 255, 255, 0.12);
        --tp-input-foreground-color: #e6ecf6;
        --tp-label-foreground-color: rgba(230, 236, 246, 0.7);
        --tp-monitor-background-color: rgba(0, 0, 0, 0.25);
        --tp-monitor-foreground-color: rgba(230, 236, 246, 0.78);
      }
      #tweakpane-host.open {
        transform: translateX(0);
      }
      #tweakpane-host .tp-rotv,
      #tweakpane-host .tp-dfwv {
        background: transparent;
        box-shadow: none;
        border-radius: 0;
      }
      /* Title bars (root + folders) and binding labels — uppercase, spaced,
         to match the floating layer toggles on the left. */
      #tweakpane-host .tp-rotv_t,
      #tweakpane-host .tp-fldv_t {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(230, 236, 246, 0.85);
      }
      #tweakpane-host .tp-lblv_l {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(230, 236, 246, 0.6);
      }
      /* Numeric inputs and other value controls — readable but not shouty. */
      #tweakpane-host .tp-txtv_i,
      #tweakpane-host .tp-sldtxtv_i {
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }
      /* Replace Tweakpane's checkbox with the toggle switch from the bottom
         layer bar. Reset the default square + checkmark so the pill is the
         only thing on screen, and bump specificity with !important since
         Tweakpane's own CSS sets sizes/colours via component variables. */
      #tweakpane-host .tp-ckbv,
      #tweakpane-host .tp-ckbv_l {
        background: transparent !important;
        border: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      #tweakpane-host .tp-ckbv_l {
        display: flex !important;
        align-items: center !important;
        justify-content: flex-end !important;
        cursor: pointer;
      }
      #tweakpane-host .tp-ckbv_w {
        position: relative !important;
        width: 32px !important;
        height: 18px !important;
        min-width: 32px !important;
        min-height: 18px !important;
        border-radius: 999px !important;
        background: rgba(255, 255, 255, 0.18) !important;
        border: 0 !important;
        box-shadow: none !important;
        padding: 0 !important;
        display: block !important;
        transition: background 0.15s ease;
      }
      #tweakpane-host .tp-ckbv_w::before {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: rgba(230, 236, 246, 0.9);
        transition: left 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
        pointer-events: none;
      }
      #tweakpane-host .tp-ckbv_m,
      #tweakpane-host .tp-ckbv_w > *,
      #tweakpane-host .tp-ckbv_w svg,
      #tweakpane-host .tp-ckbv svg {
        display: none !important;
      }
      #tweakpane-host .tp-ckbv_i:checked + .tp-ckbv_w,
      #tweakpane-host .tp-ckbv_l:has(.tp-ckbv_i:checked) .tp-ckbv_w {
        background: rgba(127, 182, 255, 0.55) !important;
      }
      #tweakpane-host .tp-ckbv_i:checked + .tp-ckbv_w::before,
      #tweakpane-host .tp-ckbv_l:has(.tp-ckbv_i:checked) .tp-ckbv_w::before {
        left: 16px;
        background: #9cc4ff;
        box-shadow: 0 0 6px rgba(127, 182, 255, 0.7);
      }
      #tweakpane-host .tp-ckbv_i:disabled + .tp-ckbv_w,
      #tweakpane-host .tp-ckbv_l:has(.tp-ckbv_i:disabled) .tp-ckbv_w {
        opacity: 0.35;
      }
      /* Make the entire row (label + value) clickable as a toggle. The actual
         click forwarding is wired in main.ts so any click in the row toggles
         the underlying input. */
      #tweakpane-host .tp-lblv:has(.tp-ckbv) {
        cursor: pointer;
        border-radius: 8px;
        transition: background 0.15s ease;
      }
      #tweakpane-host .tp-lblv:has(.tp-ckbv):hover {
        background: rgba(255, 255, 255, 0.04);
      }
      #tweakpane-host .tp-lblv:has(.tp-ckbv) .tp-lblv_l {
        cursor: pointer;
      }
      #tweakpane-host::-webkit-scrollbar {
        width: 6px;
      }
      #tweakpane-host::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
      }
      #tweakpane-host::-webkit-scrollbar-track {
        background: transparent;
      }

      /* Scenario card stack — top-right, stacked vertically below the
         tweakpane toggle. One card per active Scenario (see
         src/ui/scenario-cards.ts). Cards default to a single collapsed
         row; click the header to expand and reveal details + stop. */
      #scenario-stack {
        position: fixed;
        top: 64px;
        right: 64px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 50vh;
        overflow-y: auto;
        z-index: 6;
        width: 320px;
        pointer-events: none;
      }
      #scenario-stack > * {
        pointer-events: auto;
      }
      .scenario-card {
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        color: #cdd6e3;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 11px;
        overflow: hidden;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .scenario-card:hover {
        background: rgba(20, 26, 38, 0.7);
        border-color: rgba(255, 255, 255, 0.14);
      }
      .scenario-card-header {
        display: grid;
        grid-template-columns: 18px 1fr 80px 36px;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        cursor: pointer;
        user-select: none;
      }
      .scenario-card-icon {
        font-size: 14px;
        line-height: 1;
        text-align: center;
        color: #ffd9a0;
        text-shadow: 0 0 6px rgba(255, 217, 160, 0.55);
      }
      .scenario-card-title {
        font-weight: 600;
        letter-spacing: 0.04em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #e6ecf6;
      }
      .scenario-card-progress {
        position: relative;
        height: 4px;
        background: rgba(255, 255, 255, 0.10);
        border-radius: 999px;
        overflow: hidden;
      }
      .scenario-card-progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(to right, #ffb37a, #ff7a4d);
        box-shadow: 0 0 6px rgba(255, 122, 77, 0.45);
        transition: width 0.18s linear;
      }
      .scenario-card-days {
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
        text-align: right;
        color: rgba(230, 236, 246, 0.7);
      }
      .scenario-card-body {
        padding: 0 10px 0 36px;
        max-height: 0;
        opacity: 0;
        display: flex;
        flex-direction: column;
        gap: 3px;
        font-size: 11px;
        line-height: 1.5;
        color: rgba(230, 236, 246, 0.75);
        transition: max-height 0.18s ease, opacity 0.18s ease, padding-bottom 0.18s ease;
        overflow: hidden;
      }
      .scenario-card.expanded .scenario-card-body {
        max-height: 160px;
        opacity: 1;
        padding-bottom: 10px;
      }
      .scenario-card-row {
        font-variant-numeric: tabular-nums;
      }
      .scenario-card-stop {
        align-self: flex-start;
        margin-top: 6px;
        padding: 4px 10px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        color: #e6ecf6;
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.15s ease;
      }
      .scenario-card-stop:hover {
        background: rgba(255, 122, 77, 0.25);
        border-color: rgba(255, 122, 77, 0.5);
      }
      #scenario-stack::-webkit-scrollbar {
        width: 6px;
      }
      #scenario-stack::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
      }
      #scenario-stack::-webkit-scrollbar-track {
        background: transparent;
      }

      /* FPS counter — top-center small readout. Hidden by default; the
         Tweakpane Debug folder toggles `.visible`. */
      #fps-counter {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        padding: 6px 10px;
        background: rgba(10, 14, 22, 0.65);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: #e6ecf6;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
        z-index: 6;
        pointer-events: none;
      }
      #fps-counter.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loading">
      <span id="loading-text">loading world…</span>
      <div id="loading-progress-wrap">
        <div id="loading-progress-bar"></div>
      </div>
      <span id="loading-step-label"></span>
    </div>
    <div id="time-control">
      <button id="time-pause" type="button" aria-label="Pause time">⏸</button>
      <div
        id="time-clock"
        role="slider"
        tabindex="0"
        aria-label="Time of day"
        aria-valuemin="0"
        aria-valuemax="24"
        aria-valuenow="12"
      >
        <svg id="time-clock-svg" viewBox="-50 -50 100 100" aria-hidden="true">
          <circle class="face" cx="0" cy="0" r="44" />
          <g id="time-clock-ticks" class="ticks"></g>
          <g class="labels">
            <text x="0" y="-28">0</text>
            <text x="28" y="0">6</text>
            <text x="0" y="28">12</text>
            <text x="-28" y="0">18</text>
          </g>
          <line id="time-clock-hand" class="hand" x1="0" y1="0" x2="0" y2="-32" />
          <circle class="pivot" cx="0" cy="0" r="2.5" />
        </svg>
      </div>
      <div id="time-readout-wrap">
        <div id="time-readout">12:00</div>
        <div id="date-readout">JAN 2067</div>
      </div>
    </div>
    <div id="season-control">
      <div id="season-readout">0.0°</div>
      <div id="season-slider-wrap">
        <input id="season-slider" type="range" min="-30" max="30" step="0.5" value="0" aria-label="Season temperature offset" />
      </div>
      <div id="season-label">TEMPERATURE</div>
    </div>
    <div id="sealevel-control">
      <div id="sealevel-readout">0 m</div>
      <div id="sealevel-slider-wrap">
        <input id="sealevel-slider" type="range" min="-10000" max="10000" step="10" value="0" aria-label="Sea level offset" />
      </div>
      <div id="sealevel-label">SEA LEVEL</div>
    </div>

    <div id="layer-toggles">
      <label class="layer-toggle clouds" for="toggle-clouds">
        <span class="layer-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.2 18.5h10a3.9 3.9 0 0 0 .85-7.71 5.2 5.2 0 0 0-10.05-1.05A3.9 3.9 0 0 0 7.2 18.5z" fill="#f4f7fc" stroke="#cdd6e3" stroke-width="1.1" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="layer-name">Clouds</span>
        <input id="toggle-clouds" type="checkbox" checked />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <label class="layer-toggle ocean" for="toggle-ocean">
        <span class="layer-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.5 9.5c2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 4 2" stroke="#3da6c2" stroke-width="1.7"/>
            <path d="M2.5 14c2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 4 2" stroke="#5cc8e3" stroke-width="1.7"/>
            <path d="M2.5 18.5c2.5 0 2.5-2 5-2s2.5 2 5 2 2.5-2 5-2 2.5 2 4 2" stroke="#7fdcef" stroke-width="1.7"/>
          </svg>
        </span>
        <span class="layer-name">Ocean</span>
        <input id="toggle-ocean" type="checkbox" checked />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <label class="layer-toggle atmosphere" for="toggle-atmosphere">
        <span class="layer-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="atmHalo" cx="50%" cy="50%" r="50%">
                <stop offset="55%" stop-color="#7fb6ff" stop-opacity="0"/>
                <stop offset="100%" stop-color="#7fb6ff" stop-opacity="0.7"/>
              </radialGradient>
              <radialGradient id="atmCore" cx="35%" cy="35%" r="70%">
                <stop offset="0%" stop-color="#5b88c4"/>
                <stop offset="100%" stop-color="#1f3252"/>
              </radialGradient>
            </defs>
            <circle cx="12" cy="12" r="11" fill="url(#atmHalo)"/>
            <circle cx="12" cy="12" r="6.2" fill="url(#atmCore)"/>
            <circle cx="12" cy="12" r="6.2" fill="none" stroke="#9cc4ff" stroke-width="0.7" opacity="0.85"/>
          </svg>
        </span>
        <span class="layer-name">Atmosphere</span>
        <input id="toggle-atmosphere" type="checkbox" checked />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <label class="layer-toggle highways" for="toggle-highways">
        <span class="layer-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 20 L11 4" stroke="#c9b07e" stroke-width="2.2"/>
            <path d="M21 20 L13 4" stroke="#c9b07e" stroke-width="2.2"/>
            <path d="M9 9 L15 9" stroke="#f3eee0" stroke-width="0.9" stroke-dasharray="1.6 1.6"/>
            <path d="M7 14 L17 14" stroke="#f3eee0" stroke-width="0.9" stroke-dasharray="1.6 1.6"/>
            <path d="M5 19 L19 19" stroke="#f3eee0" stroke-width="0.9" stroke-dasharray="1.6 1.6"/>
          </svg>
        </span>
        <span class="layer-name">Highways</span>
        <input id="toggle-highways" type="checkbox" checked />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <label class="layer-toggle planes" for="toggle-planes">
        <span class="layer-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2 L13.4 3.4 L13.4 9.6 L22 13 L22 14.6 L13.4 12.6 L13.4 17.2 L15.4 19 L15.4 20 L12 19 L8.6 20 L8.6 19 L10.6 17.2 L10.6 12.6 L2 14.6 L2 13 L10.6 9.6 L10.6 3.4 Z"
                  fill="#ff9a6f" stroke="#cdd6e3" stroke-width="0.7" stroke-linejoin="round" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="layer-name">Planes</span>
        <input id="toggle-planes" type="checkbox" checked />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </div>
    <div id="explode-controls">
      <select id="region-select" aria-label="Detonation region">
        <option value="USA">USA</option>
        <option value="Europe">Europe</option>
        <option value="China">China</option>
      </select>
      <button id="explode-button" type="button" aria-label="Detonate in selected region">💥 Explode</button>
    </div>
    <button id="tweakpane-toggle" type="button" aria-label="Toggle controls">≡</button>
    <div id="tweakpane-host"></div>
    <div id="scenario-stack" aria-label="Active scenarios"></div>
    <div id="fps-counter">-- FPS</div>
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/examples/jsm/": "./vendor/three/examples/jsm/",
          "tweakpane": "./vendor/tweakpane.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
