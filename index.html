<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Earth-Destroyer (Phase 2)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>

    <div id="loading">
      <span id="loading-text">loading world…</span>
      <div id="loading-progress-wrap">
        <div id="loading-progress-bar"></div>
      </div>
      <span id="loading-step-label"></span>
    </div>

    <div id="overlay">

      <div class="area top-left">
        <div id="time-control" class="chip is-panel">
          <button id="time-pause" type="button" aria-label="Pause time">
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <rect x="5" y="3.5" width="3.5" height="13" rx="1" />
              <rect x="11.5" y="3.5" width="3.5" height="13" rx="1" />
            </svg>
          </button>
          <div id="time-readout-wrap">
            <div id="time-readout">12:00</div>
            <div id="date-readout">JAN 2067</div>
          </div>
        </div>
      </div>

      <div class="area top-center">
        <div id="fps-counter" class="chip">-- FPS</div>
      </div>

      <div class="area top-right">
        <div id="top-right-chips">
          <div id="explode-controls">
            <select id="region-select" class="chip is-button" aria-label="Detonation region">
              <option value="USA">USA</option>
              <option value="Europe">Europe</option>
              <option value="China">China</option>
            </select>
            <button id="explode-button" class="chip is-button" type="button" aria-label="Detonate in selected region">
              <span aria-hidden="true">💥</span>
              <span class="explode-label">Explode</span>
            </button>
          </div>
          <button id="settings-toggle" class="chip is-button is-square" type="button" aria-label="Quality settings">⚙</button>
        </div>
        <div id="settings-panel" class="chip is-panel">
          <h3>Quality</h3>
          <div class="setting-row">
            <label for="settings-renderscale-slider">Render scale</label>
            <span id="settings-renderscale-readout">100%</span>
          </div>
          <input id="settings-renderscale-slider" type="range" min="0.5" max="1.0" step="0.05" value="1.0" />
          <div class="setting-row-actions">
            <span id="settings-renderscale-hint">Auto-detected: —</span>
            <button id="settings-renderscale-auto" type="button">AUTO</button>
          </div>
          <h3 class="subhead">Layers</h3>
          <label class="layer-toggle clouds" for="toggle-clouds">
            <span class="layer-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.2 18.5h10a3.9 3.9 0 0 0 .85-7.71 5.2 5.2 0 0 0-10.05-1.05A3.9 3.9 0 0 0 7.2 18.5z" fill="#f4f7fc" stroke="#cdd6e3" stroke-width="1.1" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="layer-name">Clouds</span>
            <input id="toggle-clouds" type="checkbox" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
          <h3 class="subhead">Debug</h3>
          <label class="layer-toggle" for="toggle-fps">
            <span class="layer-icon" aria-hidden="true" style="font-size: 9px; font-weight: 700; letter-spacing: 0.04em; color: #e6ecf6;">FPS</span>
            <span class="layer-name">FPS counter</span>
            <input id="toggle-fps" type="checkbox" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
        </div>
      </div>

      <div class="area middle-left">
        <div id="season-control" class="chip is-panel">
          <div id="season-readout">0.0°</div>
          <div id="season-slider-wrap" class="slider-vert-wrap">
            <input id="season-slider" class="slider-vert" type="range" min="-30" max="30" step="0.5" value="0" aria-label="Season temperature offset" />
          </div>
          <div id="season-label">TEMPERATURE</div>
        </div>
        <div id="sealevel-control" class="chip is-panel">
          <div id="sealevel-readout">0 m</div>
          <div id="sealevel-slider-wrap" class="slider-vert-wrap">
            <input id="sealevel-slider" class="slider-vert" type="range" min="-10000" max="10000" step="10" value="0" aria-label="Sea level offset" />
          </div>
          <div id="sealevel-label">SEA LEVEL</div>
        </div>
      </div>

      <div class="area middle-right">
        <div id="scenario-stack" aria-label="Active scenarios"></div>
      </div>

      <div class="area bottom-right">
        <div id="tweakpane-host" class="chip is-panel"></div>
        <button id="tweakpane-toggle" class="chip is-button is-square" type="button" aria-label="Toggle controls">≡</button>
      </div>

    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three.module.js",
          "three/examples/jsm/": "./vendor/three/examples/jsm/",
          "tweakpane": "./vendor/tweakpane.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
